<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1050">
  <defs>
    <style>
      text{font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,-apple-system,'Segoe UI',Roboto,sans-serif;}
      .ttl{font-size:23px;font-weight:700;fill:#1864ab}
      .sub{font-size:13px;fill:#495057}
      .h{font-size:15px;font-weight:700;fill:#1864ab}
      .bt{font-size:13.5px;font-weight:700}
      .b{font-size:12px;fill:#343a40}
      .s{font-size:10.5px;fill:#495057}
      .xs{font-size:10px;fill:#868e96}
      .code{font-family:'SFMono-Regular',Consolas,'Roboto Mono',monospace;font-size:11px;fill:#1b1f3b}
      .mono{font-family:'SFMono-Regular',Consolas,'Roboto Mono',monospace}
    </style>
    <marker id="ag" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#495057"/></marker>
    <marker id="ao" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e8590c"/></marker>
    <marker id="ate" viewBox="0 0 10 10" markerWidth="8" markerHeight="8" refX="9" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#0ca678"/></marker>
  </defs>

  <rect x="2" y="2" width="1296" height="1046" rx="10" fill="#ffffff" stroke="#dee2e6" stroke-width="1.5"/>

  <text x="650" y="40" text-anchor="middle" class="ttl">部門費パイロット：マッピング表案の最小構成</text>
  <text x="650" y="66" text-anchor="middle" class="sub">オンプレ属性を ref データセットに実体化 → ワンマート＋RLS(サブクエリ)＋CLS で参照制御（複製マートなし）</text>

  <!-- GCP boundary -->
  <line x1="312" y1="92" x2="312" y2="998" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="318" y="105" class="xs">GCP 境界（VPN/Interconnect or 認証付き Push）</text>

  <!-- On-prem -->
  <rect x="40" y="112" width="245" height="130" rx="8" fill="#fff4e6" stroke="#f08c00" stroke-width="2"/>
  <text x="162" y="138" text-anchor="middle" class="bt" fill="#e8590c">オンプレ：人事/組織マスタ</text>
  <text x="162" y="157" text-anchor="middle" class="s">(OpenGIM＝真実源)</text>
  <text x="58" y="183" class="b">・個人 / SA → 本部コード</text>
  <text x="58" y="204" class="b">・組織階層 / 原価センタ→部門</text>
  <text x="58" y="225" class="b">・役職 / 居住区分</text>

  <!-- GCS -->
  <rect x="350" y="118" width="178" height="98" rx="8" fill="#e7f1ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="439" y="150" text-anchor="middle" class="bt" fill="#1864ab">Cloud Storage</text>
  <text x="439" y="171" text-anchor="middle" class="s">CSV / Parquet</text>
  <text x="439" y="190" text-anchor="middle" class="s">日次/時次エクスポート</text>
  <line x1="285" y1="167" x2="348" y2="167" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>

  <!-- Load -->
  <rect x="560" y="118" width="212" height="98" rx="8" fill="#e7f1ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="666" y="148" text-anchor="middle" class="bt" fill="#1864ab">BQ 定期ロード</text>
  <text x="666" y="169" text-anchor="middle" class="s">Cloud Composer / Workflows</text>
  <text x="666" y="188" text-anchor="middle" class="s">+ Cloud Scheduler</text>
  <line x1="528" y1="167" x2="558" y2="167" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>
  <!-- load -> ref -->
  <polyline points="666,216 666,258 575,258 575,330" fill="none" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>

  <!-- Alt note -->
  <rect x="800" y="116" width="470" height="100" rx="8" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="815" y="139" class="bt" fill="#495057">代替の同期 / 参照</text>
  <text x="815" y="161" class="s">① BigLake 外部表で GCS 直参照（ロード省略・RLSサブクエリ可）</text>
  <text x="815" y="181" class="s">② Datastream で分単位CDC（Oracle/MySQL/PG/SQLServer・要VPN）</text>
  <text x="815" y="201" class="s" fill="#c2255c">× federation(EXTERNAL_QUERY) はオンプレ非対応・RLS不可</text>

  <!-- BigQuery container -->
  <rect x="340" y="290" width="930" height="600" rx="12" fill="#f5f9ff" stroke="#1971c2" stroke-width="2"/>
  <text x="360" y="316" class="h">BigQuery — Publisher Project</text>

  <!-- ref dataset -->
  <rect x="362" y="332" width="412" height="408" rx="8" fill="#e6fcf5" stroke="#0ca678" stroke-width="1.5"/>
  <text x="370" y="356" class="bt" fill="#087f5b">ref データセット（属性の実体化 / RLS 参照先）</text>

  <rect x="375" y="368" width="386" height="74" rx="6" fill="#ffffff" stroke="#63e6be" stroke-width="1.2"/>
  <text x="384" y="388" class="mono" font-size="12" font-weight="700" fill="#0b7285">principal_attributes</text>
  <text x="384" y="406" class="code">email, honbu_code, dept_code,</text>
  <text x="384" y="422" class="code">role_level, residence, valid_from/to</text>

  <rect x="375" y="450" width="386" height="50" rx="6" fill="#ffffff" stroke="#63e6be" stroke-width="1.2"/>
  <text x="384" y="470" class="mono" font-size="12" font-weight="700" fill="#0b7285">org_hierarchy</text>
  <text x="384" y="488" class="code">org_code, parent_org_code</text>

  <rect x="375" y="508" width="386" height="50" rx="6" fill="#ffffff" stroke="#63e6be" stroke-width="1.2"/>
  <text x="384" y="528" class="mono" font-size="12" font-weight="700" fill="#0b7285">cost_center_map</text>
  <text x="384" y="546" class="code">cost_center, dept_code</text>

  <rect x="375" y="566" width="386" height="72" rx="6" fill="#f4fcf9" stroke="#0ca678" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="384" y="586" class="mono" font-size="12" font-weight="700" fill="#087f5b">v_visible_dept  (VIEW)</text>
  <text x="384" y="604" class="s">自部門 ＋（主席以上 → 全部門）を</text>
  <text x="384" y="620" class="s">org_hierarchy で展開・email キー</text>

  <text x="370" y="664" class="xs">※ email キーは利用者・SA 双方に有効</text>
  <text x="370" y="681" class="xs">　例: sa-stbu@…iam → (honbu=ST, dept=…)</text>
  <text x="370" y="706" class="xs">※ 行は人事マスタ由来。職改は同期で自動反映</text>

  <!-- one-mart -->
  <rect x="800" y="332" width="448" height="146" rx="8" fill="#e7f1ff" stroke="#1971c2" stroke-width="1.5"/>
  <text x="808" y="356" class="bt" fill="#1864ab">ワンマート mart.dept_cost（複製しない）</text>
  <text x="808" y="380" class="code">fiscal_period, dept_code, cost_center, account,</text>
  <text x="808" y="397" class="code">budget_amount〔予算〕, actual_amount〔実績〕 …</text>
  <rect x="808" y="410" width="205" height="56" rx="6" fill="#f3e8ff" stroke="#7048e8" stroke-width="1.3"/>
  <text x="910" y="431" text-anchor="middle" class="b" font-weight="700" fill="#5f3dc4">RLS 行アクセスポリシー</text>
  <text x="910" y="449" text-anchor="middle" class="s">ref 参照・SESSION_USER で行絞り</text>
  <rect x="1023" y="410" width="217" height="56" rx="6" fill="#ffe3ec" stroke="#d6336c" stroke-width="1.3"/>
  <text x="1131" y="431" text-anchor="middle" class="b" font-weight="700" fill="#a61e4d">CLS 列レベル（ポリシータグ）</text>
  <text x="1131" y="449" text-anchor="middle" class="s">予算=全員 / 実績=管理職のみ</text>
  <!-- ref -> RLS reference -->
  <line x1="775" y1="438" x2="806" y2="438" stroke="#0ca678" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ate)"/>
  <text x="700" y="320" class="xs" fill="#087f5b">参照</text>

  <!-- policy box -->
  <rect x="800" y="492" width="448" height="398" rx="8" fill="#ffffff" stroke="#4263eb" stroke-width="1.5"/>
  <text x="808" y="516" class="bt" fill="#364fc7">ポリシー定義（＝ルール。静的な認可テーブルではない）</text>

  <text x="808" y="540" class="b" font-weight="700" fill="#5f3dc4">■ RLS（行）</text>
  <text x="808" y="560" class="code">CREATE ROW ACCESS POLICY dept_scope</text>
  <text x="808" y="577" class="code">  ON mart.dept_cost</text>
  <text x="808" y="594" class="code">  GRANT TO ('domain:example.co.jp')</text>
  <text x="808" y="611" class="code">  FILTER USING (</text>
  <text x="808" y="628" class="code">    dept_code IN (</text>
  <text x="808" y="645" class="code">      SELECT dept_code FROM ref.v_visible_dept</text>
  <text x="808" y="662" class="code">      WHERE email = SESSION_USER()));</text>

  <text x="808" y="694" class="b" font-weight="700" fill="#a61e4d">■ CLS（列）</text>
  <text x="808" y="714" class="code">-- budget_amount : 全員可（タグなし）</text>
  <text x="808" y="731" class="code">-- actual_amount : policy tag 'confidential'</text>
  <text x="808" y="748" class="code">--   → 管理職/主席以上のみ Fine-Grained Reader</text>

  <line x1="808" y1="764" x2="1240" y2="764" stroke="#e9ecef" stroke-width="1"/>
  <text x="808" y="784" class="s" fill="#2b8a3e">✓ 人→可否の事前付与テーブルは持たない（職改で棚卸し不要）</text>
  <text x="808" y="802" class="s">　維持するのは ref（人事由来・同期）と本ルール（低頻度・Git/カタログ）だけ</text>
  <text x="808" y="824" class="s">　※ サブクエリRLSは課金・プルーニング非対応 → ref / mart は小さく・パーティション設計</text>
  <text x="808" y="842" class="s" fill="#c2255c">　※ サブクエリRLSは参照表に getData が要る＝消費者が ref を読める（開示可否を判断）</text>
  <text x="808" y="860" class="s">　　嫌なら本部ごと GRANT TO group の非サブクエリ形 / authorized view で包む</text>

  <!-- Query-time flow band -->
  <text x="40" y="928" class="h">クエリ時の判定フロー（VC本の利用者 / SA）</text>
  <rect x="40" y="945" width="182" height="56" rx="6" fill="#f1f3f5" stroke="#868e96" stroke-width="1.2"/>
  <text x="131" y="968" text-anchor="middle" class="b" font-weight="700">利用者 / SA（VC本）</text>
  <text x="131" y="985" text-anchor="middle" class="s">が mart を SELECT</text>
  <line x1="222" y1="973" x2="252" y2="973" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>
  <rect x="252" y="945" width="182" height="56" rx="6" fill="#f1f3f5" stroke="#868e96" stroke-width="1.2"/>
  <text x="343" y="968" text-anchor="middle" class="b" font-weight="700">SESSION_USER()</text>
  <text x="343" y="985" text-anchor="middle" class="s">= 認証済みメール</text>
  <line x1="434" y1="973" x2="464" y2="973" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>
  <rect x="464" y="945" width="210" height="56" rx="6" fill="#f3e8ff" stroke="#7048e8" stroke-width="1.2"/>
  <text x="569" y="968" text-anchor="middle" class="b" font-weight="700" fill="#5f3dc4">RLS: ref.v_visible_dept 参照</text>
  <text x="569" y="985" text-anchor="middle" class="s">→ 行を自部門に絞る</text>
  <line x1="674" y1="973" x2="704" y2="973" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>
  <rect x="704" y="945" width="190" height="56" rx="6" fill="#ffe3ec" stroke="#d6336c" stroke-width="1.2"/>
  <text x="799" y="968" text-anchor="middle" class="b" font-weight="700" fill="#a61e4d">CLS: 実績列を</text>
  <text x="799" y="985" text-anchor="middle" class="s">権限なしならマスク</text>
  <line x1="894" y1="973" x2="924" y2="973" stroke="#495057" stroke-width="1.6" marker-end="url(#ag)"/>
  <rect x="924" y="945" width="336" height="56" rx="6" fill="#ebfbee" stroke="#2f9e44" stroke-width="1.2"/>
  <text x="1092" y="968" text-anchor="middle" class="b" font-weight="700" fill="#2b8a3e">結果：自部門の行のみ</text>
  <text x="1092" y="985" text-anchor="middle" class="s">予算=全員 / 実績=管理職のみ可視</text>

  <text x="40" y="1028" class="xs">凡例：オレンジ=オンプレ・橙線=同期 / 青=BigQuery / 緑=ref(属性) / 紫=RLS(行) / ピンク=CLS(列)。RLSサブクエリ参照先は BigQuery / BigLake テーブルに限る。</text>
</svg>
